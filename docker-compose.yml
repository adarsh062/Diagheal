version: '3.8'

services:
  db:
    image: postgres:15
    container_name: diagheal_db
    restart: always
    environment:
      POSTGRES_USER: adarsh_admin
      POSTGRES_PASSWORD: mypassword123
      POSTGRES_DB: diagheal_db
    ports:
      - "5432:5432"  
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: 